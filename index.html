<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista 06</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <script src="https://kit.fontawesome.com/9ef413ca4b.js" crossorigin="anonymous"></script>
</head>
<body>
    <aside class="series-header" id="series-header">
        <h1 class="series-title" id="series-title"></h1>
        <img src="" alt="Pôster da série" class="series-poster" id="series-poster">
        <div class="series-information">
            <article class="year">
                <p class="subheadding">Ano</p>
                <p class="series-year" id="series-year"></p>
            </article>
            <article class="rating">
                <p class="subheadding">Classificação</p>
                <p class="series-rating" id="series-rating"></p>
            </article>
            <article class="genre">
                <p class="subheadding">Gênero(s)</p>
                <p class="series-genre" id="series-genre"></p>
            </article>
            <article class="language">
                <p class="subheadding">Língua(s)</p>
                <p class="series-language" id="series-language"></p>
            </article>
        </div>
    </aside>
    <main class="episodes-matrix" id="episodes-matrix">
        <p class="indicator">1</p>
        <p class="episode">9.0</p>
    </main>
</body>
</html>
